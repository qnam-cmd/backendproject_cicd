<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
    <link rel="stylesheet" th:href="@{/css/community/communityWriter.css}">

</head>
<body>
<div th:replace="~{fragments/common/header :: headerFragment}"></div>
<div class="community-write">
    <div class="community-write-con">

        <div class="title"> <h1>게시글 작성</h1> </div>

        <form th:action="@{/community/write}" method="POST" class="write-form" enctype="multipart/form-data">

            <div class="form-group">
                <label for="category">카테고리</label>
                <select name="category" id="category" required class="select-box">
                    <option value="" disabled selected>카테고리 선택</option>
                    <option value="공지사항">공지사항</option>
                    <option value="상품후기">상품후기</option>
                    <option value="상품Q&A">상품 Q&A</option>
                    <option value="교환/반품">교환/반품</option>
                    <option value="VIP">VIP 전용</option>
                    <option value="배송조회">배송조회</option>
                </select>
            </div>

            <div class="title">
                <label for="title">제목</label>
                <input type="text" name="title" id="title" placeholder="제목을 입력해주세요." required class="input-text">
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <input type="text" name="content" id="content" placeholder="내용을 입력해주세요." required class="textarea-content">
            </div>

            <div class="form-group">
                <label for="nickName">닉네임</label>
                <input type="text" name="nickName" id="nickName" placeholder="닉네임 입력.">
            </div>

            <div class="form-group">
                <label for="memberId">작성자(ID)</label>
                <input type="text" name="memberId" id="memberId" th:value="${#authentication != null ? #authentication.principal.memberEntity.id: ''}" readonly>
            </div>

            <div class="form-group"><span>파일</span><input type="file" name="communityFile" id="communityFile"></div>


            <div class="form-group">
                <a th:href="@{/community/communityList}">취소</a>
                <button type="submit" class="btn-submit">등록</button>
            </div>

        </form>
    </div>
</div>

<div th:replace="~{fragments/common/footer :: footerFragment}"></div>

</body>
</html>
