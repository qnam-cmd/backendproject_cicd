<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="adminWeatherFragment">
    <link rel="stylesheet" th:href="@{/css/admin/admin_weather.css}">
    <script th:src="@{/js/admin/open/api/weather.js}" defer></script>
    <div class="title"><h1>OpenApi(weather)</h1></div>
    <div class="weather">
        <div class="weather-con">


            <div class="w-left">
                <div class="search">
                    <select name="search" id="search">
                        <option value="Seoul">서울</option>
                        <option value="Busan">부산</option>
                        <option value="Gwangju">광주</option>
                        <option value="ChunCheon">춘천</option>
                    </select>
                    <button onclick="weatherSearchFn()">검색</button>
                </div>

                <div class="city">
                    <span class="con"></span>
                    <span class="description"></span>
                    <span class="icon"></span>
                </div>

                <div class="temp_min">
                    <span>최저온도</span>
                    <span class="con"></span>
                </div>

                <div class="temp_max">
                    <span>최고온도</span>
                    <span class="con"></span>
                </div>

                <div class="sunrise">
                    <span>해뜨는시간</span>
                    <span class="con"></span>
                </div>

                <div class="sunset">
                    <span>해지는시간</span>
                    <span class="con"></span>
                </div>
            </div>

            <div class="w-right">
                <div id="map" style="max-width: 80vh; height: 50vh"></div>
            </div>

        </div>
    </div>

</th:block>

</html>
